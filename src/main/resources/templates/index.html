<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Employee Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row">
        <div class="col-md-12 text-center mb-4">
            <h2 class="text-primary fw-bold">Employee Management Dashboard</h2>
            <p class="text-muted">Interactive Thymeleaf UI for your Spring Boot App</p>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white fw-bold">Add New Employee</div>
                <div class="card-body">
                    <form th:action="@{/web/employees/save}" th:object="${employee}" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Employee Name</label>
                            <input type="text" th:field="*{empName}" class="form-control" placeholder="Enter name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Salary ($)</label>
                            <input type="number" th:field="*{salary}" class="form-control" placeholder="Enter salary" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Save Employee</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white fw-bold">Active Employee Records</div>
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">ID</th>
                                <th>Name</th>
                                <th>Salary</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emp : ${employees}">
                                <td class="ps-3 fw-semibold" th:text="${emp.empId}">1</td>
                                <td th:text="${emp.empName}">John Doe</td>
                                <td th:text="${'$' + #numbers.formatInteger(emp.salary, 0, 'COMMA')}">$50,000</td>
                                <td class="text-center">
                                    <a th:href="@{/web/employees/delete/{id}(id=${emp.empId})}" 
                                       class="btn btn-danger btn-sm px-3 fw-bold"
                                       onclick="return confirm('Are you sure you want to delete this employee?');">
                                        Delete
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(employees)}">
                                <td colspan="4" class="text-center p-4 text-muted">No records found in database. Add an employee to get started!</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
